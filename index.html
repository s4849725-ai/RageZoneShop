<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Free Fire Shop Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌗 MODE -->
<button class="theme-btn" onclick="toggleMode()">🌗 Mode</button>

<h1>💎 Free Fire Shop Pro</h1>

<h2>LES TARIFS</h2>

<div class="container">

  <div class="card">
    <h3>🔴 TOP UP</h3>
    <button onclick="ajouter('100+10 💎',4600)">100+10 - 4 600 Ar</button>
    <button onclick="ajouter('210+21 💎',9200)">210+21 - 9 200 Ar</button>
    <button onclick="ajouter('310+31 💎',13700)">310+31 - 13 700 Ar</button>
    <button onclick="ajouter('420+42 💎',18300)">420+42 - 18 300 Ar</button>
    <button onclick="ajouter('530+53 💎',23100)">530+53 - 23 100 Ar</button>
  </div>

  <div class="card">
    <h3>🎟️ ABONNEMENT</h3>
    <button onclick="ajouter('Weekly',10500)">Weekly - 10 500 Ar</button>
    <button onclick="ajouter('Monthly',47000)">Monthly - 47 000 Ar</button>
  </div>

  <div class="card">
    <h3>🆙 LEVEL UP</h3>
    <button onclick="ajouter('120💎',3100)">120 - 3 100 Ar</button>
    <button onclick="ajouter('200💎',4000)">200 - 4 000 Ar</button>
    <button onclick="ajouter('350💎',6000)">350 - 6 000 Ar</button>
  </div>

</div>

<!-- 🛒 PANIER -->
<div class="panier">
  <h2>🛒 Panier</h2>
  <ul id="list"></ul>
  <p>Total : <span id="total">0</span> Ar</p>
  <button onclick="payer()">Payer</button>
</div>

<script src="script.js"></script>

</body>
  </html>
