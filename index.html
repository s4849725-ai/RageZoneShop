index.html<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Free Fire Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<button class="theme-btn" onclick="toggleMode()">🌗</button>

<h1>💎 Free Fire Shop</h1>

<!-- 📋 FORMULAIRE -->
<div class="formulaire">
  <input type="text" id="uid" placeholder="UID joueur">
  <input type="text" id="pseudo" placeholder="Pseudo joueur">
  <input type="text" id="ref" placeholder="Référence paiement">

  <select id="methode">
    <option value="">Paiement</option>
    <option value="MVola">MVola</option>
    <option value="Orange Money">Orange Money</option>
  </select>
</div>

<!-- 💎 PRODUITS -->
<div class="container">

  <div class="card">
    <h3>🔴 TOP UP</h3>
    <button onclick="add('100+10 💎',4600)">100+10 - 4600</button>
    <button onclick="add('210+21 💎',9200)">210+21 - 9200</button>
    <button onclick="add('310+31 💎',13700)">310+31 - 13700</button>
    <button onclick="add('420+42 💎',18300)">420+42 - 18300</button>
    <button onclick="add('530+53 💎',23100)">530+53 - 23100</button>
    <button onclick="add('630+63 💎',27700)">630+63 - 27700</button>
    <button onclick="add('730+73 💎',32400)">730+73 - 32400</button>
    <button onclick="add('840+84 💎',37100)">840+84 - 37100</button>
    <button onclick="add('1080+108 💎',46400)">1080+108 - 46400</button>
    <button onclick="add('1290+129 💎',55300)">1290+129 - 55300</button>
    <button onclick="add('1500+150 💎',64100)">1500+150 - 64100</button>
    <button onclick="add('2200+220 💎',91600)">2200+220 - 91600</button>
  </div>

  <div class="card">
    <h3>🎟️ ABONNEMENT UID</h3>
    <button onclick="add('Weekly 450💎',10500)">Weekly - 10500</button>
    <button onclick="add('Monthly 2600💎',47000)">Monthly - 47000</button>
  </div>

  <div class="card">
    <h3>🆙 LEVEL UP UID</h3>
    <button onclick="add('120💎',3100)">120 - 3100</button>
    <button onclick="add('200💎',4000)">200 - 4000</button>
    <button onclick="add('350💎',6000)">350 - 6000</button>
    <button onclick="add('1270💎',24000)">Full pack - 24000</button>
  </div>

  <div class="card">
    <h3>🟢 COMPTE</h3>
    <button onclick="add('Weekly lite',3500)">Weekly lite - 3500</button>
    <button onclick="add('Weekly',8500)">Weekly - 8500</button>
    <button onclick="add('Monthly',35500)">Monthly - 35500</button>
  </div>

  <div class="card">
    <h3>🔴 LARGAGE</h3>
    <button onclick="add('0.99$',5500)">0.99$ - 5500</button>
    <button onclick="add('1.99$',9900)">1.99$ - 9900</button>
  </div>

</div>

<!-- 🛒 PANIER -->
<div class="panier">
  <h2>🛒 Panier</h2>
  <ul id="list"></ul>
  <p>Total : <span id="total">0</span> Ar</p>
  <button onclick="payer()">Payer</button>
</div>

<script src="script.js"></script>

</body>
</html>
