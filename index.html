<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Free Fire Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ACCUEIL -->
<div id="accueil" class="center">
  <h1>🔥 Free Fire Shop 🔥</h1>
  <button onclick="entrer()">🎮 Entrer</button>
</div>

<!-- SHOP -->
<div id="shop" style="display:none;">

<button class="theme-btn" onclick="toggleMode()">🌗</button>

<h1>💎 Tarifs Free Fire</h1>

<!-- FORM -->
<div class="formulaire">
  <input type="text" id="uid" placeholder="UID">
  <input type="text" id="pseudo" placeholder="Pseudo">
  <input type="text" id="ref" placeholder="Référence paiement">

  <select id="methode">
    <option value="">Paiement</option>
    <option value="MVola">MVola</option>
    <option value="Orange Money">Orange Money</option>
  </select>
</div>

<!-- BOUTONS CATÉGORIES -->
<div class="categories">
  <button onclick="showCat('topup')">Top Up</button>
  <button onclick="showCat('levelup')">Level Up</button>
  <button onclick="showCat('abo')">Abonnement</button>
  <button onclick="showCat('largage')">Largage</button>
</div>

<!-- PRODUITS -->
<div class="container">

  <!-- TOP UP -->
  <div id="topup" class="card">
    <h3>TOP UP</h3>
    <button onclick="add('100+10',4600)">100+10 - 4600</button>
    <button onclick="add('210+21',9200)">210+21 - 9200</button>
    <button onclick="add('310+31',13700)">310+31 - 13700</button>
    <button onclick="add('420+42',18300)">420+42 - 18300</button>
    <button onclick="add('530+53',23100)">530+53 - 23100</button>
    <button onclick="add('630+63',27700)">630+63 - 27700</button>
    <button onclick="add('730+73',32400)">730+73 - 32400</button>
    <button onclick="add('840+84',37100)">840+84 - 37100</button>
    <button onclick="add('1080+108',46400)">1080+108 - 46400</button>
    <button onclick="add('1290+129',55300)">1290+129 - 55300</button>
    <button onclick="add('1500+150',64100)">1500+150 - 64100</button>
    <button onclick="add('2200+220',91600)">2200+220 - 91600</button>
  </div>

  <!-- ABONNEMENT -->
  <div id="abo" class="card" style="display:none;">
    <h3>ABONNEMENT</h3>
    <button onclick="add('Weekly UID',10500)">Weekly UID - 10500</button>
    <button onclick="add('Monthly UID',47000)">Monthly UID - 47000</button>

    <button onclick="add('Weekly lite',3500)">Weekly lite - 3500</button>
    <button onclick="add('Weekly',8500)">Weekly - 8500</button>
    <button onclick="add('Monthly',35500)">Monthly - 35500</button>
  </div>

  <!-- LEVEL UP -->
  <div id="levelup" class="card" style="display:none;">
    <h3>LEVEL UP</h3>
    <button onclick="add('120 UID',3100)">120 - 3100</button>
    <button onclick="add('200 UID',4000)">200 - 4000</button>
    <button onclick="add('350 UID',6000)">350 - 6000</button>
    <button onclick="add('1270 UID',24000)">Full - 24000</button>

    <button onclick="add('120 compte',2800)">120 - 2800</button>
    <button onclick="add('200 compte',3700)">200 - 3700</button>
    <button onclick="add('350 compte',5500)">350 - 5500</button>
    <button onclick="add('1270 compte',23100)">Full - 23100</button>
  </div>

  <!-- LARGAGE -->
  <div id="largage" class="card" style="display:none;">
    <h3>LARGAGE</h3>
    <button onclick="add('0.99$',5500)">0.99$ - 5500</button>
    <button onclick="add('1.99$',9900)">1.99$ - 9900</button>
  </div>

</div>

<!-- PANIER -->
<div class="panier">
  <h2>🛒 Panier</h2>
  <ul id="list"></ul>
  <p>Total : <span id="total">0</span> Ar</p>
  <button onclick="payer()">Payer</button>
</div>

</div>

<script src="script.js"></script>
</body>
    </html>
