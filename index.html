<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Free Fire Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🟢 PAGE ACCUEIL -->
<div id="accueil" class="center">
  <h1>🔥 Free Fire Shop 🔥</h1>
  <button onclick="entrer()">🎮 Entrer</button>
</div>

<!-- 🟢 SHOP (caché au début) -->
<div id="shop" style="display:none;">

<button class="theme-btn" onclick="toggleMode()">🌗</button>

<h1>💎 Tarifs Free Fire</h1>

<!-- FORM -->
<div class="formulaire">
  <input type="text" id="uid" placeholder="UID joueur">
  <input type="text" id="pseudo" placeholder="Pseudo joueur">
  <input type="text" id="ref" placeholder="Référence paiement">

  <select id="methode">
    <option value="">Paiement</option>
    <option value="MVola">MVola</option>
    <option value="Orange Money">Orange Money</option>
  </select>
</div>

<!-- PRODUITS -->
<div class="container">

  <div class="card">
    <h3>🔴 TOP UP</h3>
    <button onclick="add('100+10 💎',4600)">100+10 - 4600</button>
    <button onclick="add('210+21 💎',9200)">210+21 - 9200</button>
    <button onclick="add('310+31 💎',13700)">310+31 - 13700</button>
    <button onclick="add('420+42 💎',18300)">420+42 - 18300</button>
    <button onclick="add('530+53 💎',23100)">530+53 - 23100</button>
  </div>

</div>

<!-- PANIER -->
<div class="panier">
  <h2>🛒 Panier</h2>
  <ul id="list"></ul>
  <p>Total : <span id="total">0</span> Ar</p>
  <button onclick="payer()">Payer</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
